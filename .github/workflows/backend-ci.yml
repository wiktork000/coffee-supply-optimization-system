name: Backend CI

on:
  push:
    branches: [ "main", "master", "dev"]
  pull_request:
    branches: [ "main", "master", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder: [coffee_manager, coffee_optimizer]

    defaults:
      run:
        working-directory: ${{ matrix.folder }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Poetry
      working-directory: .
      run: |
        pip install poetry
        poetry config virtualenvs.create false

    - name: Install dependencies
      run: poetry install --no-interaction --no-root

    - name: Install AMPL solver modules
      if: matrix.folder == 'coffee_optimizer'
      run: poetry run python -m amplpy.modules install cbc

    - name: Lint code with Ruff
      run: |
        poetry run ruff check .

    - name: Check formatting with Ruff
      run: |
        poetry run ruff format --check .

    - name: Run tests
      run: |
        poetry run pytest

    - name: Build Docker Images
      working-directory: .
      run: make build
