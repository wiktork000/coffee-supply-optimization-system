services:
    db:
        image: postgres:15-alpine
        container_name: coffee_postgres_db
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: coffee_user
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coffee_password}
            POSTGRES_DB: coffee_db
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./coffee_manager/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
            - ./coffee_manager/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U coffee_user -d coffee_db"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

    backend:
        build:
            context: ./coffee_manager
            dockerfile: Dockerfile
        container_name: coffee_manager_api
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_HOST: db
            POSTGRES_PORT: 5432
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "8000:8000"
        volumes:
            - ./coffee_manager/src:/app/src
            - ./coffee_manager/pyproject.toml:/app/pyproject.toml
            - ./coffee_manager/poetry.lock:/app/poetry.lock
        command:
            [
                "uvicorn",
                "coffee_manager.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--reload",
            ]

    optimizer:
        build:
            context: ./coffee_optimizer
            dockerfile: Dockerfile
        container_name: coffee_optimizer_api
        restart: always
        environment:
            - AMPL_LICENSE_KEY=${AMPL_LICENSE_KEY}
        ports:
            - "8001:8001"
        volumes:
            - ./coffee_optimizer/src:/app/src

    frontend:
        build:
            context: ./coffee_manager/frontend
            dockerfile: Dockerfile
        container_name: coffee_manager_frontend
        restart: always
        ports:
            - "5173:5173"
        depends_on:
            - backend
        volumes:
            - ./coffee_manager/frontend/src:/app/src
            - frontend_node_modules:/app/node_modules
        command:
            ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
    postgres_data:
    frontend_node_modules:
